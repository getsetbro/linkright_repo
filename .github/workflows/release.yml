name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails app
        working-directory: LinkRight/LinkRight
        run: wails build

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        working-directory: LinkRight/installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" LinkRight.iss
        shell: pwsh

      - name: Create zip of installer
        run: Compress-Archive -Path "LinkRight/installer/output/LinkRight_Setup.exe" -DestinationPath "LinkRight_Setup.zip"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: LinkRight_Setup.zip
          generate_release_notes: true
